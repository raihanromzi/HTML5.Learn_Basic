<!-- HTML Structure-->
<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Defines a title for the document -->
    <title>Basic Tags</title>

   <!-- Defines metadata about an HTML Document -->
    <meta charset="utf-8">
    <meta name="description" content="HTML5 Course">
    <meta name="keywords" content="HTML5">
    <meta name="author" content="Raihan Romzi">
    <meta name="viewport" content="widht-device-width, initial-scale=1.0">

    <!-- Defines the relationship between a document and an external resource (mostly used to link to a style sheet) -->
    <link rel="stylesheet" href="">

    <!-- Defines style information for a document (Place in <head>) GLOBAL STYLE-->
    <style>
        body {
            background: blue;
        }

        h1 {
            color: red;
        }
    </style>

</head>
<body>
    <!-- <h1> to <h6> - Defines HTML Headings -->
    <h1></h1>
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>

    <!-- Inserts a single line break -->
    <br>

    <!-- Defines a thematic change in the content -->
    <hr>

    <!-- Defines a Paragraph -->
    <p></p>

</body>
</html>
