<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>

    <style media="screen">
      span {
        color:red;
      }

      .div1 {
        background: black;
        border: 1px solid lime;
        width: 50%;
        height: 500px;
      }

      main {
        background: blue;
        height: 500px;
      }

    </style>
  </head>
  <body>

    <!-- <div> - Defines a section in a document -->
    <div class="div1">

    </div>
    <div>
      <h1>Heading 1</h1>
    </div>

    <!-- <span> - Defines a section in a document ussually Logo-->
    <h1>Learn<span> HTML</span></h1>

    <!-- <header> - Defines a header for the document or section (Nav, Logo)-->
    <header></header>

    <!-- <nav> - Defines  navigation links -->
    <nav></nav>

    <!-- <main> - Specifies the main content of a document (only on HTML5) -->
    <main>
      <h1>Heading 1</h1>
    </main>

    <!-- <section> - Defines a section in a document -->
    <section></section>

    <!-- <article> - Defines an article -->
    <article class=""></article>

    <!-- <aside> - Defines content aside from the page content -->
    <aside class=""></aside>

    <!-- <details> - Defines additional details that the user can view or hide -->
    <details open>
      this is details
    </details>

    <!-- <dialog> - Defines a dialog box or window -->
    <dialog open>This is open dialog window </dialog>

    <!-- <summary> - Defines a visible heading for a <details> element -->
    <details open>
      <summary>this is summary</summary>
    </details>

    <!-- <data> - Adds a machine-readable translation of a given content -->
    <data value="0002">this is data</data>

    <!-- <footer> - Defines a footer for a document or  section -->
    <footer></footer>
    
  </body>
</html>
