<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body>

    <!-- <audio> - Defines sound content (MP3, Wave, OGG)-->
    <audio src="horse.mp3" controls autoplay loop muted preload="auto">
      <source src="https://" type="video/">
      <source src="https://" type="audio/">
      <source src="https://" type="picture/">
    </audio>

    <!-- <source> - Defines multiple media resources for media elements (<video>, <audio> and <picture>) -->
    <source src="https://" type="audio/ogg">

    <!-- <track> - Defines text tracks for media elements (<video> and <audio>) -->
    <track kind="subtitles" src="sampleSubtitles_en.srt" srclang="en">

    <!-- <video> - Defines a video or movie (MP4, WEBEG, OGG)-->
    <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay poster="posterimage.jpg" loop muted preload="auto" width="" height="" controls>
       Sorry, your browser doesn't support embedded videos.
    </video>

  </body>
</html>
