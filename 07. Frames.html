<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body>

    <!-- <frame> - Defines a window (a frame) in a frameset (NOT Support)-->
    <frame></frame>

    <!-- <frameset> - Defines a set of frames (NOT Support) -->
    <frameset></frameset>

    <!-- <noframes> - Defines an alternate content for users that do not support frames (NOT Support)-->
    <noframes></noframes>

    <!-- <iframe> - Defines an inline frame (Embed content)-->
    <iframe src="https://en.wikipedia.org/wiki/Main_Page" width="800" height="800""></iframe>

  </body>
</html>
