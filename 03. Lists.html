<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
  </head>
  <body>

    <!-- <ul> - Defines an unordered list (bullet)  -->
    <ul>
      <li>list item</li>
    </ul>

    <!-- <ol> - Defines an ordered list (number) -->
    <ol>
      <li>list item 1</li>
      <li>list item 2</li>
      <li>list item 3</li>
    </ol>

    <!-- <li> - Defines a list item -->
    <li></li>

    <!-- <dl> - Defines a description list -->
    <dl>
      <dt>Term name 1</dt>
        <dd>Term name 1 description</dd>
      <dt>Term name 2</dt>
        <dd>Term name 2 description</dd>
    </dl>

    <!-- <dt> - Defines a term name in a description list -->
    <dt></dt>

    <!-- <dd> - Defines a description of a term name in a description list -->
    <dd></dd>

  </body>
</html>
